name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., v1.0.0)'
        required: true
        type: string

  workflow_run:
    workflows: ["Release"]
    types:
      - completed

env:
  FONT_NAME: "NxtFont"
  PACKAGE_NAME: "@nxtcoder17/nxtfont"

jobs:
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Download subset webfont from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --pattern "${{ env.FONT_NAME }}-webfont-subset.zip" \
            --output webfont-subset.zip

      - name: Prepare package
        run: |
          unzip webfont-subset.zip
          mkdir -p WOFF2
          cp -r ./${{ env.FONT_NAME }}/WOFF2-subset/* ./WOFF2/
          rm -rf ./${{ env.FONT_NAME }} webfont-subset.zip

      - name: Generate package.json and CSS
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.npm }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: node ./scripts/generate-package.js

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
