name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  FONT_NAME: "NxtFont"

jobs:
  github-release:
    name: Create Github Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_nightly: ${{ steps.meta.outputs.is_nightly }}
      sanitized_ref: ${{ steps.meta.outputs.sanitized_ref }}
    steps:
      - uses: nxtcoder17/actions/metadata@main
        id: meta

      - name: create github release
        uses: nxtcoder17/actions/github-release-create@main
        with:
          name: ${{steps.meta.outputs.version}}
          github_token: ${{ github.token }}
          pre_release: ${{ !fromJSON(steps.meta.outputs.is_tag) }}

  build:
    runs-on: ubuntu-latest
    needs:
      - github-release
    strategy:
      matrix:
        font_type:
          - ttf
          - webfont
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ttfautohint
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends ttfautohint

      - name: Setup Python (webfont only)
        if: matrix.font_type == 'webfont'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fonttools (webfont only)
        if: matrix.font_type == 'webfont'
        run: pip install fonttools[woff]

      - name: Clone Iosevka
        run: |
          git clone --depth 1 https://github.com/be5invis/Iosevka.git
          cp ./private-build-plans.toml ./Iosevka/private-build-plans.toml

      - name: Building NxtFont
        working-directory: Iosevka
        run: |
          npm install
          npm run build -- ${{matrix.font_type}}::${{ env.FONT_NAME }}

      # Zip BEFORE subsetting so full zips don't contain subset files
      - name: Zip build files
        working-directory: Iosevka/dist
        run: |
          mkdir -p /tmp/output
          zip -r /tmp/output/${{ env.FONT_NAME }}-${{ matrix.font_type }}+unhinted.zip ${{ env.FONT_NAME }}
          rm -rf ${{ env.FONT_NAME }}/TTF-Unhinted
          zip -r /tmp/output/${{ env.FONT_NAME }}-${{ matrix.font_type }}.zip ${{ env.FONT_NAME }}

      - name: Generate font subsets (webfont only)
        if: matrix.font_type == 'webfont'
        run: |
          ./scripts/subset-fonts.sh ./Iosevka/dist/${{ env.FONT_NAME }}/WOFF2
          mv ./Iosevka/dist/${{ env.FONT_NAME }}/WOFF2/subsets \
             ./Iosevka/dist/${{ env.FONT_NAME }}/WOFF2-subset

      - name: Zip subset files (webfont only)
        if: matrix.font_type == 'webfont'
        working-directory: Iosevka/dist
        run: |
          zip -r /tmp/output/${{ env.FONT_NAME }}-webfont-subset.zip \
            ${{ env.FONT_NAME }}/WOFF2-subset

      - name: upload to github_release
        uses: nxtcoder17/actions/github-release-upload@main
        with:
          name: ${{needs.github-release.outputs.version}}
          github_token: ${{ github.token }}
          files: |+
            /tmp/output/*
